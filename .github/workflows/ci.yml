name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun --filter runline build
      - run: bun --filter runline test
      # Lint/format across the whole monorepo — catches issues in
      # pi-runline and runline-plugins that the runline filter misses.
      - run: bun run check
