name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  # Serialize releases so two tags can't race on the same npm package.
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun --filter runline build
      - run: bun --filter runline test
      - run: bun run check

  verify-versions:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          RUNLINE=$(node -p "require('./packages/runline/package.json').version")
          PI=$(node -p "require('./packages/pi-runline/package.json').version")
          echo "tag=$TAG runline=$RUNLINE pi-runline=$PI"
          if [ "$RUNLINE" != "$TAG" ]; then
            echo "::error::packages/runline/package.json version ($RUNLINE) does not match tag ($TAG)"
            exit 1
          fi
          if [ "$PI" != "$TAG" ]; then
            echo "::error::packages/pi-runline/package.json version ($PI) does not match tag ($TAG)"
            exit 1
          fi

  publish:
    needs: verify-versions
    runs-on: ubuntu-latest
    strategy:
      # Publish each package in its own job so a failure in one doesn't
      # silently skip the other.
      fail-fast: false
      matrix:
        package: [runline, pi-runline]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      # runline must be built before publishing. pi-runline has no build
      # step of its own and imports runline at runtime.
      - run: bun --filter runline build
      - name: Publish to npm
        working-directory: packages/${{ matrix.package }}
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '(rc|alpha|beta)'; then
            npm publish --tag next --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
