name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun --filter runline build
      - run: bun --filter runline test

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      # Publish each package in its own job so a failure in one doesn't
      # silently skip the other.
      fail-fast: false
      matrix:
        package: [runline, pi-runline]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install
      # runline itself must be built before publishing; pi-runline has no
      # build step but runline's dist is fine to rebuild regardless.
      - run: bun --filter runline build
      - name: Publish to npm
        working-directory: packages/${{ matrix.package }}
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '(rc|alpha|beta)'; then
            npm publish --tag next --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
